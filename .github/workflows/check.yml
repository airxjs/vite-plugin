name: Code Check

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Verify output files
        run: |
          test -f output/index.js && echo "index.js OK"
          test -s output/index.d.ts && echo "index.d.ts OK"

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci
      - run: npx tsc --noEmit

  example-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install and build plugin
        run: |
          npm ci
          npm run build

      - name: Install and build example
        run: |
          cd examples/minimal
          # Replace workspace:* with file: for local testing
          sed -i 's/"vite-plugin-airx": "workspace:\*"/"vite-plugin-airx": "file:..\/.."/' package.json
          # Use local built plugin via file: protocol
          npm install
          npm run build

      - name: Verify JSX example output
        run: |
          test -f examples/minimal/dist/index.html && echo "example index.html OK"
          compgen -G "examples/minimal/dist/assets/*.js" > /dev/null && echo "example asset bundle OK"
          echo "JSX example built successfully with local vite-plugin-airx"
